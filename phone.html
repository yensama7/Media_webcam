<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Camera</title>
  <style>
    body { background: #111; color: white; font-family: sans-serif; text-align: center; padding-top: 20px; }
    video { width: 100%; max-width: 500px; border-radius: 8px; background: #000; }
    #status { color: #00ff88; }
  </style>
</head>
<body>

  <h2>Camera Status: <span id="status">Waiting...</span></h2>
  <video id="preview" autoplay playsinline muted></video>

<script>
  const video = document.getElementById("preview");
  const statusEl = document.getElementById("status");

  // Added a default prefix to save you some typing on the phone
  const laptopIP = prompt("Enter laptop IP", "192.168."); 

  const deviceId = crypto.randomUUID();
  const deviceName = "Phone-" + deviceId.slice(0,4);

  const ws = new WebSocket(`ws://${laptopIP}:8080`);

  ws.onopen = () => {
    statusEl.textContent = "Connected";
    ws.send(JSON.stringify({
      type: "register",
      id: deviceId,
      name: deviceName
    }));
  };

  ws.onerror = () => {
    statusEl.textContent = "Server Connection Failed";
    statusEl.style.color = "red";
  };

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  }).then(stream => {
    video.srcObject = stream;

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    setInterval(() => {
      if (ws.readyState !== 1) return;

      // Ensure canvas matches video resolution before drawing
      if (video.videoWidth > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        ws.send(JSON.stringify({
          type: "frame",
          data: canvas.toDataURL("image/jpeg", 0.5) // 0.5 compression helps reduce lag
        }));
      }
    }, 100); // 10fps is a safe sweet spot for WebSockets
  }).catch(err => {
    statusEl.textContent = "Camera Error: " + err.message;
    statusEl.style.color = "red";
  });
</script>

</body>
</html>
